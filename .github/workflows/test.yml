name: Tests & Code Quality

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: reconx_test
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest pytest-cov pytest-asyncio pytest-mock
    
    - name: Run unit tests with coverage
      run: |
        pytest backend/tests/unit/ \
          --cov=backend \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term \
          -v
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/reconx_test
        REDIS_URL: redis://localhost:6379/0
    
    - name: Run integration tests
      run: |
        pytest backend/tests/integration/ \
          --cov=backend \
          --cov-append \
          --cov-report=xml \
          -v
      env:
        DATABASE_URL: postgresql://test_user:test_password@localhost:5432/reconx_test
        REDIS_URL: redis://localhost:6379/0
    
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install black flake8 mypy bandit safety
    
    - name: Check code formatting with Black
      run: black backend/ --check --diff
    
    - name: Lint with Flake8
      run: |
        flake8 backend/ \
          --count \
          --select=E9,F63,F7,F82 \
          --show-source \
          --statistics
        flake8 backend/ \
          --count \
          --exit-zero \
          --max-complexity=10 \
          --max-line-length=120 \
          --statistics
    
    - name: Type checking with mypy
      run: mypy backend/app --ignore-missing-imports --no-error-summary || true
    
    - name: Security check with Bandit
      run: bandit -r backend/ -ll -f json -o bandit-report.json || true
    
    - name: Dependency vulnerability check with Safety
      run: safety check --json || true

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@v0.9.2
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  docker-build:
    runs-on: ubuntu-latest
    needs: [ python-tests, code-quality ]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./backend/Dockerfile
        push: false
        tags: reconx-elite-backend:test
    
    - name: Build frontend image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./frontend/Dockerfile
        push: false
        tags: reconx-elite-frontend:test
    
    - name: Scan backend image with Trivy
      uses: aquasecurity/trivy-action@v0.9.2
      with:
        image-ref: 'reconx-elite-backend:test'
        format: 'sarif'
        output: 'trivy-backend-results.sarif'
    
    - name: Upload backend scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-backend-results.sarif'
